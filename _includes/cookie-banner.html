<div id="cookie-banner"
    class="fixed bottom-0 left-0 right-0 z-[100] transform transition-transform duration-500 translate-y-full">
    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        <div
            class="bg-white rounded-2xl shadow-2xl border border-cyan/20 p-6 flex flex-col md:flex-row items-center justify-between gap-6 backdrop-blur-md bg-white/95">
            <div class="flex-1">
                <h3 class="text-lg font-bold text-navy mb-1 flex items-center gap-2">
                    <span class="text-cyan"><i class="fas fa-cookie-bite"></i></span>
                    Aviso de Cookies
                </h3>
                <p class="text-gray-600 text-sm leading-relaxed">
                    Utilizamos cookies para mejorar tu experiencia y analizar el tráfico del sitio. Al continuar
                    navegando, aceptas nuestro uso de cookies.
                    <a href="{{ '/aviso-de-privacidad/' | relative_url }}"
                        class="text-cyan hover:underline font-medium">Leer más</a>.
                </p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <button id="accept-cookies"
                    class="flex-1 md:flex-none px-8 py-3 bg-navy text-white font-bold rounded-xl hover:bg-cyan transition-colors duration-300 shadow-lg shadow-navy/20">
                    Aceptar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const banner = document.getElementById('cookie-banner');
        const acceptBtn = document.getElementById('accept-cookies');

        // Verificación inmediata para evitar parpadeos
        if (localStorage.getItem('cookies-accepted') === 'true') {
            banner.style.display = 'none';
            return;
        }

        setTimeout(() => {
            banner.classList.remove('translate-y-full');
        }, 1000);

        acceptBtn.addEventListener('click', function () {
            localStorage.setItem('cookies-accepted', 'true');
            banner.classList.add('translate-y-full');
            setTimeout(() => {
                banner.style.display = 'none';
            }, 600); // Esperar a que termine la animación
        });
    });
</script>
